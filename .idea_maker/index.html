<head>
<meta charset="utf-8" />

<title>Harness — 透明的 AI，懂你的 Agent</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* Surfaces — fresh cream-green tones */
    --bg: #FAFBF7;            /* main panel — lighter, brighter */
    --bg-2: #FFFFFF;          /* card */
    --bg-rail: #ECEFE6;       /* sidebar — distinctly tinted sage-cream */
    --bg-rail-2: #DDE2D5;
    --bg-tint: #EEF4EE;       /* soft hover */
    --ink: #1F2D34;           /* primary ink (softer than near-black) */
    --ink-2: #3D4D55;
    --ink-3: #6B7B80;
    --ink-4: #9AA6A8;
    --line: #EAEAE1;
    --line-2: #F0F0E8;
    --line-strong: #DDDCCF;

    /* Brand — sage teal */
    --brand: #4FA89A;
    --brand-2: #3D8C7F;
    --brand-soft: #E4F1ED;
    --brand-ink: #1F4A42;

    /* Stage colors (the four phases) — softer, more pastel */
    --think: #5B8DD6;          /* 💭 sky blue */
    --think-bg: #E8F0FA;
    --search: #38B0B0;         /* 🔍 fresh teal */
    --search-bg: #E0F2F1;
    --tool: #E08C5A;           /* 🛠 soft terracotta */
    --tool-bg: #FCEEE2;
    --gen: #D6B450;            /* ✨ soft gold */
    --gen-bg: #F8F0D2;

    /* Status */
    --ok: #4FA88A;
    --warn: #C28A3F;
    --err: #C9756B;

    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 0 rgba(31,45,52,.025), 0 1px 2px rgba(31,45,52,.03);
    --shadow-md: 0 2px 8px rgba(31,45,52,.04), 0 1px 2px rgba(31,45,52,.03);
    --shadow-lg: 0 18px 50px -16px rgba(31,45,52,.14), 0 4px 12px rgba(31,45,52,.05);
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    font-family: "Noto Sans SC", "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .mono{font-family:"JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums}
  .latin{font-family:"Inter Tight", -apple-system, sans-serif}

  button{font-family:inherit;color:inherit;cursor:pointer}
  input,textarea{font-family:inherit;color:inherit}

  /* Scrollbar */
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-track{background:transparent}
  *::-webkit-scrollbar-thumb{background:rgba(11,17,32,.12);border-radius:6px;border:2px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:rgba(11,17,32,.22);border:2px solid transparent;background-clip:content-box}

  /* Reusable atoms */
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:8px;border:1px solid var(--line-strong);background:#fff;font-size:13px;font-weight:500;color:var(--ink-2);transition:.15s}
  .btn:hover{background:#fafaf7;border-color:#c6c3b8}
  .btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn-primary:hover{background:#16307a;border-color:#16307a}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--ink-3)}
  .btn-ghost:hover{background:rgba(11,17,32,.04);color:var(--ink)}
  .btn-sm{height:26px;padding:0 9px;font-size:12px;border-radius:6px}

  .chip{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;font-size:11.5px;font-weight:500;border-radius:999px;background:rgba(11,17,32,.05);color:var(--ink-2)}
  .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;font-family:"JetBrains Mono",monospace;font-size:10.5px;background:#fff;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:4px;color:var(--ink-3)}

  /* App layout shell */
  #app-root{position:fixed;inset:0;display:flex;flex-direction:column}

  /* Animations */
  @keyframes pulse-soft { 0%,100%{opacity:.55} 50%{opacity:1} }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes spin { to { transform: rotate(360deg) } }
  @keyframes bar-fill { from{width:0} }
  @keyframes dot { 0%,80%,100%{transform:scale(.4);opacity:.3} 40%{transform:scale(1);opacity:1} }

  .fade-up{animation:fadeUp .4s cubic-bezier(.2,.7,.2,1) both}
  .fade-in{animation:fadeIn .3s ease-out both}

  /* Focus rings */
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}

  /* Hide scrollbar on rail */
  .no-scroll{scrollbar-width:none}
  .no-scroll::-webkit-scrollbar{display:none}
</style>
</head>
