# Phase 1 部署：Cloudflare Quick Tunnel + Vercel 前端 + 阿里云 ECS 后端
#
# 架构：
#   浏览器 → Vercel（Next.js）→ random-words.trycloudflare.com → ECS 内部 api:3001
#
# 与 docker-compose.prod.yml 的区别：
#   - 没有 web 容器（前端去 Vercel 了）
#   - 没有 Caddy（Cloudflare Quick Tunnel 全包了 SSL + 反代）
#   - 没有暴露端口到主机（cloudflared 走出站连接，不需要 80/443/8443）
#
# 用法（在 ECS 上）：
#   cp .env.tunnel.example .env.tunnel
#   vim .env.tunnel           # 填密码 / LLM key
#   docker compose -f docker-compose.tunnel.yml --env-file .env.tunnel up -d
#   docker compose -f docker-compose.tunnel.yml exec ollama ollama pull bge-m3
#   docker compose -f docker-compose.tunnel.yml logs cloudflared | grep trycloudflare.com
#
# 拿到 trycloudflare URL 后配到 Vercel 的 NEXT_PUBLIC_API_URL。
#
# 重要：每次 cloudflared 容器重启，URL 会变。
#   - restart: unless-stopped 防止意外重启
#   - 想要稳定 URL 要走 Named Tunnel（Phase 2 关联 retreevo.com 后做）
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d rag"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - prod

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/rag
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}  # 默认通配符
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      API_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - prod

  # ── Cloudflare Quick Tunnel ────────────────────────────────────────────
  # cloudflared 启动后会从日志输出一个 https://random-words.trycloudflare.com URL。
  # 这是 Phase 1 临时方案 —— 每次 cloudflared 重启 URL 会变。
  # Phase 2（关联 retreevo.com）会改成 Named Tunnel 用固定域名。
  #
  # --no-autoupdate：禁用自动更新（不希望容器自己重启换 URL）
  # --url：转发 trycloudflare.com 流量到内部 api 服务的 3001 端口
  cloudflared:
    # 锁死版本：避免国内镜像加速器把 :latest 缓存成远古版本（2020.7.0 的根证书已过期）
    image: cloudflare/cloudflared:2026.5.2
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://api:3001
    depends_on:
      api:
        condition: service_healthy  # 重要：等待 API 健康检查通过
    networks:
      - prod

networks:
  prod:
    driver: bridge

volumes:
  postgres_data:
