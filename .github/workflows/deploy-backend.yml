# 后端自动部署 — GitHub Actions build & push 到阿里云 ACR，然后 SSH 让 ECS pull 重启
#
# 为什么这么设计：
#   - ECS 是 1C/2GB，docker build 频繁 OOM 且磁盘紧张，构建必须移出 ECS
#   - 阿里云 ACR 个人版免费；ECS 拉镜像走 ACR 同地域或公网，比 GitHub Container
#     Registry 在国内稳定得多
#   - SHA tag 让回滚和审计有据可查；latest tag 让 compose 默认配置无需改动
#
# 前置条件（在 GitHub repo Settings → Secrets and variables → Actions 配）：
#   ACR_REGISTRY    crpi-xxxx.cn-shenzhen.personal.cr.aliyuncs.com
#   ACR_NAMESPACE   idea_maker
#   ACR_USERNAME    你的 ACR 用户名（邮箱形式或带 @xxx.onaliyun.com 后缀）
#   ACR_PASSWORD    ACR 固定密码（非阿里云登录密码）
#   ECS_HOST        ECS 公网 IP
#   ECS_USER        SSH 用户（root 或专用 deploy 用户）
#   ECS_SSH_KEY     私钥全文（PEM 格式，含 BEGIN/END 行）
#   ECS_SSH_PORT    可选，默认 22
#   ECS_APP_DIR     ECS 上仓库路径，如 /var/www/html/idea-maker

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "docker-compose*.yml"
      - "apps/api/Dockerfile"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

# 并发控制：同时只跑一个部署，新 push 排队（不取消，避免半发布状态）
concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/idea-maker-api

jobs:
  build-and-push:
    name: Build & push image to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (sha)
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          # buildkit 缓存：layer 复用，加速后续 build
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger ECS to pull & restart api
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 8m
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd ${{ secrets.ECS_APP_DIR }}

            # compose 默认从 cwd 自动读 .env，无需 --env-file
            # （ECS 上既有的 .env 已经有 ACR_REGISTRY / ACR_NAMESPACE / LLM_* / EMBEDDING_* 全套变量）
            # API_IMAGE_TAG 用 build job 输出的 sha tag 做 immutable deploy
            COMPOSE="docker compose -f docker-compose.named-tunnel.yml"
            export API_IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}

            echo "── 0. 预检 .env 存在 + 关键变量已设 ──"
            test -f .env || { echo "❌ .env 不存在，先在 ECS 上准备好"; exit 1; }
            # 防 image 路径变成 /idea-maker-api:latest 这种废形态——prod 20 小时
            # 未刷新的根因就是 ACR_REGISTRY 没解析到导致 pull 静默失败
            grep -qE "^ACR_REGISTRY=.+" .env || { echo "❌ .env 缺 ACR_REGISTRY"; exit 1; }
            grep -qE "^ACR_NAMESPACE=.+" .env || { echo "❌ .env 缺 ACR_NAMESPACE"; exit 1; }

            echo "── 0.5 同步代码到最新 main（compose 文件 / DDL / 脚本等基础设施层） ──"
            # 应用代码已经打进 docker 镜像了，这里 pull 主要是同步 docker-compose.yml /
            # .github/workflows / scripts/ 等"宿主机层面"的文件。
            # --ff-only：拒绝任何合并，宿主机不该出现 diverge；如果意外有本地改动应人工
            # 介入而不是自动合并。
            # 无条件 pull：已是最新时是 no-op，避免 git diff --quiet 返回 1 被 drone-ssh
            # script_stop 当成失败直接退出
            git pull --ff-only origin main

            echo "── 1. 登录 ACR（幂等，token 已存就跳过）──"
            docker login ${{ secrets.ACR_REGISTRY }} \
              -u '${{ secrets.ACR_USERNAME }}' \
              -p '${{ secrets.ACR_PASSWORD }}'

            echo "── 2. 确认 image 路径展开正确 ──"
            # ⚠️ awk 脚本必须单行——drone-ssh (appleboy/ssh-action) 的 script_stop 会
            # 在每个换行后注入 DRONE_SSH_PREV_COMMAND_EXIT_CODE=$? 退出码检查，把多行
            # awk 脚本从中间插坏，报 "syntax error each rule must have pattern or action"
            resolved_image=$($COMPOSE config | awk '/^  api:[[:space:]]*$/ {in_api=1; next} /^  [a-zA-Z0-9_-]+:[[:space:]]*$/ {in_api=0} in_api && $1 == "image:" {print $2; exit}')
            echo "resolved image: $resolved_image"
            if [[ "$resolved_image" == /* ]]; then
              echo "❌ image 路径不完整（变量未解析），检查 .env 里的 ACR_REGISTRY/ACR_NAMESPACE"
              exit 1
            fi

            echo "── 3. pull 新镜像（API_IMAGE_TAG=$API_IMAGE_TAG）──"
            $COMPOSE pull api

            echo "── 4. 重启 api（postgres 不动）──"
            $COMPOSE up -d api

            echo "── 5. 等 health check ──"
            api_healthy=false
            for i in {1..30}; do
              status=$($COMPOSE ps api --format json | \
                       grep -o '"Health":"[^"]*"' | head -1 || echo '"Health":"unknown"')
              echo "[$i/30] $status"
              if echo "$status" | grep -q '"healthy"'; then
                echo "✅ api healthy"
                api_healthy=true
                break
              fi
              sleep 4
            done
            $api_healthy || { echo "❌ api 未在超时内达到 healthy"; exit 1; }

            echo "── 5.5 确保 Named Tunnel 在线 ──"
      
            $COMPOSE up -d --no-deps cloudflared
            tunnel_status=$($COMPOSE ps cloudflared --status running --format json)
            test -n "$tunnel_status" || { echo "❌ cloudflared 未运行"; exit 1; }
            echo "✅ cloudflared running"

            echo "── 6. 清旧镜像（保留正在用的 + latest） ──"
            docker image prune -af --filter "until=24h" || true

            echo "── 7. 最后 30 行日志 ──"
            $COMPOSE logs api --tail 30
