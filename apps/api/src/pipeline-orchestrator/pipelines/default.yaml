# default.yaml — MVP 默认 RAG pipeline 编排
#
# 两条 pipeline 共用一份配置：
#
#   Ingestion Pipeline（文档 → 向量）：
#     idempotency → preprocess → chunk → embedding → storage
#     由 IngestionJobRunner 硬编码调用，此处仅做文档记录。
#
#   Generation Pipeline（查询 → 结果）：
#     context-management → query-rewrite → intent-recognition → retrieval
#     → filter → rerank → citation → prompt-build → generation → evaluation → fallback
#     由 PipelineOrchestratorService 按 stages[] 顺序执行。
#
# 注意：这不是 Agent（没有 LLM 决策循环 / 工具自主选择 / 自评估迭代）。
# 是固定顺序的 Pipeline Orchestrator，等价于 YAML 写死的 DAG。
#
# 环境变量依赖：
#   OPENAI_API_KEY — embedding（ingestion + retrieval）+ LLM（rewrite / rerank / generation）
#   DATABASE_URL   — pgvector 存取

name: default
description: "MVP 默认 RAG pipeline：检索 → 生成 → 评估"
version: "1.1.0"

# ── Ingestion（文档记录，IngestionJobRunner 硬编码） ──────────────────────────
# ingestion:
#   - id: idempotency
#     method: sha256-content
#   - id: preprocess
#     method: auto (markdown-structure / pdf-pages / markitdown)
#   - id: chunk
#     method: recursive
#     params: { chunkSize: 600, overlap: 80 }
#   - id: embedding
#     method: openai-3-small
#     params: { dimension: 1024, batchSize: 16 }
#   - id: storage
#     method: pgvector-replace-version

# ── Generation Pipeline（PipelineOrchestratorService 按序执行） ───────────────

stages:
  - id: context-management
    method: session-history
    params: {}

  - id: query-rewrite
    method: rule-keyword-expansion
    params:
      maxExpansions: 3

  - id: intent-recognition
    method: rule-based
    params: {}

  # feat-experiment-2 验证：单文档场景 dense-vector 最优（bge-m3 语义已饱和，
  # BM25/hybrid 无增量收益）。threshold=0.1 留出"弱信号缓冲"——dense 分数被
  # filter 阶段的 minScore + MMR 二次过滤，0.1 几乎不丢任何候选，避免过严卡死。
  - id: retrieval
    method: dense-vector
    params:
      topK: 10
      threshold: 0.1
      embeddingProvider: openai

  # feat-experiment-4.x 验证：pipeline-filter（含 MMR + 多样性）优于 score-threshold。
  #   minScore=0.2：过滤太弱的弱信号
  #   maxPerDocument=5：防单文档独占（多文档场景关键）
  #   mmrLambda=0.7：相关性优先但留出 30% 多样性
  #   finalTopK=10：输出给 rerank 的候选数
  - id: filter
    method: pipeline-filter
    params:
      minScore: 0.2
      maxPerDocument: 5
      finalTopK: 10
      mmrLambda: 0.7

  # feat-experiment-3/6 验证：score-only + summary-keywords（在 ingestion 阶段）
  # 组合最优。metadata-boost 与 summary-keywords 同时开会互相干扰（experiment-6 T04）
  - id: rerank
    method: score-only
    params:
      rerankTopN: 5

  # feat-experiment-4.0/4.1 验证：chunk-citation 全面优于 section-citation。
  # maxEvidencePerClaim=3：每个 claim 最多引用 3 个 chunk 作证据
  - id: citation
    method: chunk-citation
    params:
      maxEvidencePerClaim: 3

  - id: prompt-build
    method: marketing-template
    params:
      systemPrompt: "你是一位专业的营销文案策划师。基于以下参考资料，为用户生成高质量的营销内容。"
      outputFormat: markdown

  - id: generation
    method: marketing-ideas
    params:
      temperature: 0.7
      maxTokens: 2000

  - id: evaluation
    method: rag-metrics-only
    params: {}

  - id: fallback
    method: reject-answer
    params:
      fallbackMessage: "抱歉，当前信息不足以生成高质量内容。请补充更多参考资料后重试。"
