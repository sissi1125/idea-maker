# Phase 2 部署：Cloudflare Named Tunnel（固定域名）
#
# 前置：
#   1. 域名已托管到 Cloudflare（Cloudflare Dashboard → Add a Site）
#   2. ECS 上跑过：
#        cloudflared tunnel login
#        cloudflared tunnel create idea-maker-api
#        cloudflared tunnel route dns idea-maker-api api.你的域名.com
#      ~/.cloudflared/ 下生成了 cert.pem + <UUID>.json
#   3. ~/.cloudflared/config.yml 已写好（tunnel UUID / ingress 规则）
#
# 启动：
#   docker compose -f docker-compose.named-tunnel.yml --env-file .env up -d
#
# 验证：
#   curl https://api.你的域名.com/health
#
# vs Quick Tunnel 的区别：
#   - URL 固定（绑你自己的域名），重启不变 → Vercel 不用反复改 env
#   - 需要 Cloudflare 账号 + 自有域名
#   - 走出站连接，ECS 仍不需要开任何入站端口

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d rag"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - prod

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - prod

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/rag
      OLLAMA_BASE_URL: http://ollama:11434
      API_PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - prod

  # ── Cloudflare Named Tunnel ────────────────────────────────────────────
  # 用宿主机 ~/.cloudflared 下的凭证 + config.yml 起 named tunnel
  # 容器内 /etc/cloudflared/ 对应宿主机 ~/.cloudflared/
  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ~/.cloudflared:/etc/cloudflared:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - prod

networks:
  prod:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
