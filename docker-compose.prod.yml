# 生产 docker-compose — feat-013.5 阿里云 ECS 部署
#
# 一键启栈：caddy（反向代理 + 自动 SSL）+ postgres + ollama + api + web
#
# 用法（在 ECS 上）：
#   cp .env.production.example .env.production
#   vim .env.production           # 填 DOMAIN、密钥等
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# 首次起完后还需要一步：
#   docker compose -f docker-compose.prod.yml exec ollama ollama pull bge-m3
#
# 验证：
#   curl https://api.${DOMAIN}/health
#   curl https://${DOMAIN}/
#
# 重新构建（代码更新后）：
#   docker compose -f docker-compose.prod.yml build api web
#   docker compose -f docker-compose.prod.yml up -d api web

services:
  # ── Caddy 反向代理 + 自动 SSL ────────────────────────────────────────────
  # 80/443 → 后面服务的路由：
  #   ${DOMAIN}      → web:3000
  #   api.${DOMAIN}  → api:3001
  # Caddy 自动 Let's Encrypt（需 DNS 已指到 ECS 公网 IP）
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data         # 证书持久化（重启不掉证书）
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - prod

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────
  # bitnami/postgresql:latest 内置 pgvector 0.8.x，CREATE EXTENSION 即用
  postgres:
    image: bitnami/postgresql:16
    restart: unless-stopped
    environment:
      POSTGRESQL_DATABASE: rag
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - prod
    # 不暴露端口到主机：只有同 network 的服务能连
    # 如需 psql 调试：docker compose exec postgres psql -U postgres rag

  # ── Ollama 本地 embedding ─────────────────────────────────────────────
  # bge-m3：1024 维（与 DDL 中 notes.embedding vector(1024) 对齐）
  # 注意：模型不在镜像里，首次启动后要：
  #   docker compose exec ollama ollama pull bge-m3
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # 模型缓存（pull 一次后重启不重下）
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - prod
    # bge-m3 RAM 估 ~600MB；如想跑 GPU 加 deploy.resources.reservations.devices

  # ── NestJS API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production

      # DB（内部 service 名 + 默认端口）
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/rag

      # 鉴权
      JWT_SECRET: ${JWT_SECRET}

      # CORS：允许生产域名 + Vercel preview（如未来开混合）
      CORS_ORIGIN: https://${DOMAIN},https://www.${DOMAIN}

      # LLM（BYOK，写进 .env.production）
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}

      # Embedding → 内部 ollama
      EMBEDDING_API_KEY: ollama
      EMBEDDING_BASE_URL: http://ollama:11434/v1
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_DIMENSION: 1024

      # 可选：Tavily web search
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

      # API 端口（与 Dockerfile EXPOSE 一致）
      API_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - prod
    # 不暴露端口到主机：流量都走 Caddy

  # ── Next.js Web ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL 必须 build time 注入（编译进 bundle）
        # 浏览器从公网域名访问 api.${DOMAIN}
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0   # standalone server 监听这个
    depends_on:
      - api
    networks:
      - prod

networks:
  prod:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
